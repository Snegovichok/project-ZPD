{% extends "base.html" %}
{% block title %}Подключиться к приватному чату{% endblock %}
{% block content %}
<h1>Подключиться к приватному чату</h1>
<form action="{{ url_for('join_private_chat') }}" method="post">
    <label>Введите ID:</label>
    <input type="text" name="chat_id" required>
    <label>Пароль:</label>
    <input type="password" name="password" required>
    <button type="submit">Подключиться</button>
</form>
<a href="{{ url_for('account') }}"><button>Назад</button></a>
{% endblock %}
